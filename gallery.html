<style>
/* ── GALLERY SECTION ── */
.gallery-section{padding:48px 64px 80px}

/* ── FILTERS ── */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:40px}
.filter-btn{background:none;border:1.5px solid var(--almond-silk);color:var(--text-mid);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;cursor:pointer;transition:background .15s,border-color .15s,color .15s;-webkit-tap-highlight-color:transparent}
.filter-btn:hover{border-color:var(--brick-red);color:var(--brick-red)}
.filter-btn.active{background:var(--brick-red);border-color:var(--brick-red);color:#fff}
.filter-count{font-size:11px;opacity:.6;margin-left:4px}

/* ── GRID ── */
.gallery-grid{columns:3;column-gap:14px}
.gallery-item{break-inside:avoid;margin-bottom:14px;border-radius:6px;overflow:hidden;cursor:pointer;position:relative}
.gallery-item img{width:100%;height:auto;display:block;transition:transform .3s ease}
.gallery-item:hover img{transform:scale(1.03)}
.gallery-item .placeholder-box{width:100%;background:var(--almond-silk);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(88,20,9,.45);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:background .2s}
.gallery-item:hover .placeholder-box{background:#c9b5b2}
.gallery-item.hidden{display:none}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:2000;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-img-wrap{max-width:88vw;max-height:88vh;display:flex;align-items:center;justify-content:center}
.lb-img-wrap img,.lb-img-wrap .lb-placeholder{max-width:100%;max-height:88vh;border-radius:4px;display:block}
.lb-placeholder{width:480px;height:360px;background:rgba(218,201,198,.15);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.lb-close{position:absolute;top:18px;right:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:22px;line-height:1;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,.25)}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;padding:0}
.lb-prev{left:20px}.lb-next{right:20px}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.25)}
.lb-counter{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.55);font-size:12px;font-weight:500;letter-spacing:.08em}
.lb-label{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:12px}

@media(max-width:480px){
  .gallery-grid{columns:3;column-gap:6px}
  .gallery-item{margin-bottom:6px}
}
@media(max-width:1024px){
  .gallery-section{padding:32px 24px 60px}
  .filter-bar{gap:6px;margin-bottom:28px}
  .filter-btn{font-size:12px;padding:6px 14px}
  .gallery-grid{columns:2;column-gap:10px}
  .gallery-item{margin-bottom:10px}
}
</style>  <script src="assets/layout.js" defer></script>

<script>
// ── Gallery filter ──
const allItems = [...document.querySelectorAll('.gallery-item')];

function updateCounts() {
  const cats = ['all','facility','camps','recreational','competitive'];
  cats.forEach(cat => {
    const el = document.getElementById('count-' + cat);
    if (!el) return;
    const n = cat === 'all' ? allItems.length : allItems.filter(i => i.dataset.category === cat).length;
    el.textContent = '(' + n + ')';
  });
}
updateCounts();

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    allItems.forEach(item => {
      item.classList.toggle('hidden', f !== 'all' && item.dataset.category !== f);
    });
  });
});

// ── Lightbox ──
const lightbox = document.getElementById('lightbox');
const lbContent = document.getElementById('lb-content');
const lbCounter = document.getElementById('lb-counter');
const lbLabel = document.getElementById('lb-label');
let lbItems = [];
let lbIndex = 0;

function getVisibleItems() {
  return allItems.filter(i => !i.classList.contains('hidden'));
}

function lbRender(i) {
  const item = lbItems[i];
  lbContent.innerHTML = '';
  if (item.dataset.placeholder !== undefined) {
    const ph = document.createElement('div');
    ph.className = 'lb-placeholder';
    ph.innerHTML = `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Photo coming soon</span>`;
    lbContent.appendChild(ph);
  } else {
    const img = document.createElement('img');
    img.src = item.dataset.src;
    img.alt = item.dataset.label || '';
    lbContent.appendChild(img);
  }
  lbLabel.textContent = item.dataset.label || '';
  lbCounter.textContent = (i + 1) + ' / ' + lbItems.length;
}

function lbOpen(item) {
  lbItems = getVisibleItems();
  lbIndex = lbItems.indexOf(item);
  lbRender(lbIndex);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function lbClose() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + lbItems.length) % lbItems.length;
  lbRender(lbIndex);
}

allItems.forEach(item => {
  item.addEventListener('click', () => lbOpen(item));
});

document.getElementById('lb-close').addEventListener('click', lbClose);
document.getElementById('lb-prev').addEventListener('click', () => lbNav(-1));
document.getElementById('lb-next').addEventListener('click', () => lbNav(1));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lbClose(); });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') lbClose();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});
</script>
